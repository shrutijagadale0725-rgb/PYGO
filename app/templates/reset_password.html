{% extends "base.html" %}
{% block title %}Reset password — PYGO{% endblock %}
{% block content %}
<div class="wrap">
  <div class="card auth-card">
    <h2>Set a new password</h2>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="field">
        <label for="new_password">New password</label>
        <div class="password-wrap">
          <input type="password" id="new_password" name="new_password" required minlength="6" autocomplete="new-password">
          <button type="button" class="password-toggle" data-target="new_password" aria-label="Show password">😯</button>
        </div>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm new password</label>
        <div class="password-wrap">
          <input type="password" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password">
          <button type="button" class="password-toggle" data-target="confirm_password" aria-label="Show password">😯</button>
        </div>
      </div>
      <button class="cta" type="submit" style="width:100%;">Reset password</button>
    </form>
  </div>
</div>
<script src="{{ url_for('static', filename='js/password-toggle.js') }}"></script>
{% endblock %}
