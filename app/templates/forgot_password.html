{% extends "base.html" %}
{% block title %}Forgot password — PYGO{% endblock %}
{% block content %}
<div class="wrap">
  <div class="card auth-card">
    <h2>Forgot your password?</h2>
    <p style="font-size:14px; color:var(--dim); margin-top:-6px;">
      Enter the email you signed up with and we'll send you a link to reset it.
    </p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <button class="cta" type="submit" style="width:100%;">Send reset link</button>
    </form>
    <div class="auth-switch"><a href="{{ url_for('auth.login') }}">Back to log in</a></div>
  </div>
</div>
{% endblock %}
