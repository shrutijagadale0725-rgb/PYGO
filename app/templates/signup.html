{% extends "base.html" %}
{% block title %}Sign up — PYGO{% endblock %}
{% block content %}
<div class="wrap">
  <div class="card auth-card">
    <h2>Create your account</h2>
    <form method="POST">
      <div class="field">
        <label for="display_name">Name</label>
        <input type="text" id="display_name" name="display_name" placeholder="What should we call you?">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      <button class="cta" type="submit" style="width:100%;">Sign up</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></div>
  </div>
</div>
{% endblock %}
