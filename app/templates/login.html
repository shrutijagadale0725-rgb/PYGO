{% extends "base.html" %}
{% block title %}Log in — PYGO{% endblock %}
{% block content %}
<div class="wrap">
  <div class="card auth-card">
    <h2>Log in</h2>
    <form method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button class="cta" type="submit" style="width:100%;">Log in</button>
    </form>
    <div class="auth-switch">New here? <a href="{{ url_for('auth.signup') }}">Create an account</a></div>
  </div>
</div>
{% endblock %}
